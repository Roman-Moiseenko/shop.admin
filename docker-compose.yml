services:
  admin-spa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: admin_nuxt
    restart: always
    tty: true
    volumes:
      - ./:/var/www
      - /var/www/node_modules
    environment:
      AUTH_GUARD: api
      API_URL: http://localhost:8080
      NUXT_PUBLIC_API_BASE: /api
      SERVICE_NAME: app
      SERVICE_TAGS: dev
      HOST: 0.0.0.0                 # важно для dev-сервера
      CHOKIDAR_USEPOLLING: true
    working_dir: /var/www
    expose:
      - 3000
    networks:
      - app-network
      - shop-network

  nginx:
    image: nginx:alpine
    container_name: admin_nginx
    restart: unless-stopped
    tty: true
    ports:
      - "8080:80"          # На хосте приложение будет доступно на localhost:8080
    volumes:
      - ./:/var/www
      - ./nginx/conf.d/nuxt.conf:/etc/nginx/conf.d/nuxt.conf:ro
    depends_on:
      - admin-spa
    networks:
      - app-network
      - shop-network
    command: ["/bin/sh", "-c", "rm -f /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"]


networks:
  app-network:
    driver: bridge
  shop-network:
    external: true